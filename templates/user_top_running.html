<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いえ電シェア - 運転中</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fff0f3;
            --header-bg: #ffffff;
            --text-color: #4a4a4a;
            --accent-orange: #ff8c42;
            --accent-pink: #f5b7b1;
            --card-bg: #ffffff;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 90vh;
            background-color: var(--bg-color);
            position: relative;
            overflow-y: hidden;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 8px solid #333;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 431px) {
            body {
                padding: 20px;
                height: 100vh;
                overflow: hidden;
            }
            .phone-container {
                width: min(390px, 100%);
                height: auto;
                aspect-ratio: 9 / 19.5;
                max-height: 850px;
            }
        }

        header {
            background-color: var(--header-bg);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-orange);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .header-logo i {
            font-size: 1.4rem;
            color: #e8a0ad;
        }

        .header-logo span {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #c47a8a;
        }

        main {
            padding: 20px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .flash-message {
            background: #ffffff;
            border-radius: 12px;
            padding: 10px 12px;
            color: #666;
            font-weight: bold;
            box-shadow: var(--shadow);
            font-size: 0.9rem;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .action-card {
            background: var(--card-bg);
            padding: 20px 10px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            line-height: 1.5;
        }

        .action-card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-pink);
        }

        .status-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px 0;
        }

        .status-badge {
            background-color: #ff9999;
            color: #000;
            padding: 40px 60px;
            border-radius: 80px;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
            line-height: 1.2;
            width: 85%;
        }

        .status-badge span {
            display: block;
            font-size: 1.8rem;
            margin-top: 5px;
        }

        .usage-stats {
            text-align: center;
        }

        .time-display {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .cost-display {
            font-size: 1.6rem;
            font-weight: bold;
            color: #666;
        }

        .btn-stop {
            width: 100%;
            max-width: 260px;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #666;
            background: #fff;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active {
            display: flex;
        }

        #stopConfirmModal .modal-content {
            width: 85%;
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #stopConfirmModal .modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        #stopConfirmModal .status-badge {
            display: inline-block;
            color: #000;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 1.8rem;
            font-weight: bold;
            margin: 0 auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: auto;
        }

        .stats-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 10px 0;
        }

        .stats-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stats-label {
            font-size: 1rem;
            color: #777;
            font-weight: bold;
        }

        .stats-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-color);
        }

        #stopConfirmModal .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            margin-top: 10px;
        }

        #stopConfirmModal .btn-main {
            width: 100%;
            max-width: 240px;
            padding: 14px;
            border-radius: 12px;
            border: 3px solid #666;
            background: #fff;
            color: var(--text-color);
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
        }

        #stopConfirmModal .btn-cancel {
            width: 100%;
            max-width: 150px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #999;
            background: #f8f8f8;
            color: #666;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <div class="header-logo">
            <i class="fas fa-home"></i>
            <span>いえ電シェア</span>
        </div>
    </header>

    <main>
        <h1>{{ user_name }}さんのマイページ</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">{{ messages[-1] }}</div>
        {% endif %}
        {% endwith %}

        <div class="action-grid">
            <a href="{{ url_for('user_usage_new') }}" class="action-card">
                <i class="fas fa-plus action-card-icon"></i>
                <div>忘れた分<br>を追加</div>
            </a>
            <a href="{{ url_for('user_usage_logs') }}" class="action-card">
                <i class="fas fa-file-alt action-card-icon"></i>
                <div>記録を<br>みる</div>
            </a>
        </div>

        <div class="status-content">
            <div class="status-badge" style="background-color: {{ running_device_color }};">
                {{ running_device_name }}
                <span>運転中</span>
            </div>

            <div class="usage-stats">
                <div class="time-display" id="elapsedTimeDisplay">--時間--分</div>
                <div class="cost-display" id="estimatedCostDisplay">--円（目安）</div>
            </div>

            <form action="{{ url_for('user_usage_stop') }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="btn-stop" type="button" id="openStopConfirmModal">運転を停止</button>
            </form>
        </div>
    </main>

    <div class="modal-overlay" id="stopConfirmModal">
        <div class="modal-content">
            <p class="modal-title">運転を停止しますか？</p>

            <div class="status-badge" style="background-color: {{ running_device_color }};">{{ running_device_name }}</div>

            <div class="stats-area">
                <div class="stats-item">
                    <span class="stats-label">使用時間</span>
                    <span class="stats-value" id="stopConfirmElapsedTime">--時間--分</span>
                </div>
                <div class="stats-item">
                    <span class="stats-label">料金目安</span>
                    <span class="stats-value" id="stopConfirmEstimatedCost">--円</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-main" type="button" id="confirmStopButton">記録を終了する</button>
                <button class="btn-cancel" type="button" id="cancelStopButton">やめる</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 運転開始時刻からの経過時間と目安料金を表示し、1分ごとに更新する
    const startTime = new Date("{{ running_start_time_iso }}");
    const devicePowerKw = Number("{{ running_device_power_kw }}");
    const estimatedUnitPrice = {{ estimated_unit_price if estimated_unit_price is not none else 'null' }};
    const elapsedTimeDisplay = document.getElementById("elapsedTimeDisplay");
    const estimatedCostDisplay = document.getElementById("estimatedCostDisplay");
    const openStopConfirmModalButton = document.getElementById("openStopConfirmModal");
    const stopConfirmModal = document.getElementById("stopConfirmModal");
    const confirmStopButton = document.getElementById("confirmStopButton");
    const cancelStopButton = document.getElementById("cancelStopButton");
    const stopConfirmElapsedTime = document.getElementById("stopConfirmElapsedTime");
    const stopConfirmEstimatedCost = document.getElementById("stopConfirmEstimatedCost");
    const stopForm = openStopConfirmModalButton.closest("form");

    function updateUsageStats() {
        if (Number.isNaN(startTime.getTime())) {
            elapsedTimeDisplay.textContent = "--時間--分";
            estimatedCostDisplay.textContent = "計算に必要な時刻情報が不正です";
            stopConfirmElapsedTime.textContent = "--時間--分";
            stopConfirmEstimatedCost.textContent = "--円";
            return;
        }

        const now = new Date();
        let elapsedMs = now.getTime() - startTime.getTime();
        if (elapsedMs < 0) {
            elapsedMs = 0;
        }

        const elapsedMinutes = Math.floor(elapsedMs / (1000 * 60));
        const hours = Math.floor(elapsedMinutes / 60);
        const minutes = elapsedMinutes % 60;
        elapsedTimeDisplay.textContent = `${hours}時間${String(minutes).padStart(2, "0")}分`;
        stopConfirmElapsedTime.textContent = elapsedTimeDisplay.textContent;

        if (estimatedUnitPrice === null || Number.isNaN(Number(estimatedUnitPrice))) {
            estimatedCostDisplay.textContent = "仮単価未設定";
            stopConfirmEstimatedCost.textContent = "仮単価未設定";
            return;
        }

        const elapsedHours = elapsedMs / (1000 * 60 * 60);
        const estimatedCost = devicePowerKw * elapsedHours * Number(estimatedUnitPrice);
        estimatedCostDisplay.textContent = `${Math.round(estimatedCost)}円（目安）`;
        stopConfirmEstimatedCost.textContent = `${Math.round(estimatedCost)}円`;
    }

    // 運転停止確認モーダルの開閉制御
    openStopConfirmModalButton.addEventListener("click", function () {
        stopConfirmModal.classList.add("active");
    });

    confirmStopButton.addEventListener("click", function () {
        stopForm.submit();
    });

    cancelStopButton.addEventListener("click", function () {
        stopConfirmModal.classList.remove("active");
    });

    stopConfirmModal.addEventListener("click", function (event) {
        if (event.target === stopConfirmModal) {
            stopConfirmModal.classList.remove("active");
        }
    });

    updateUsageStats(); // 初回表示時に即時計算
    setInterval(updateUsageStats, 60 * 1000);
</script>

</body>
</html>
