<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>いえ電シェア - 運転中</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fff0f3;
            --header-bg: #ffffff;
            --text-color: #4a4a4a;
            --accent-orange: #ff8c42;
            --accent-pink: #f5b7b1;
            --card-bg: #ffffff;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 90vh;
            background-color: var(--bg-color);
            position: relative;
            overflow-y: hidden;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            border: 8px solid #333;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 431px) {
            body {
                padding: 20px;
                height: 100vh;
                overflow: hidden;
            }
            .phone-container {
                width: min(390px, 100%);
                height: auto;
                aspect-ratio: 9 / 19.5;
                max-height: 850px;
            }
        }

        header {
            background-color: var(--header-bg);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-orange);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .header-logo i {
            font-size: 1.4rem;
            color: #e8a0ad;
        }

        .header-logo span {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #c47a8a;
        }

        main {
            padding: 20px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .action-card {
            background: var(--card-bg);
            padding: 20px 10px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: var(--text-color);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            line-height: 1.5;
        }

        .action-card-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-pink);
        }

        .status-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 20px 0;
        }

        .status-badge {
            background-color: #ff9999;
            color: #000;
            padding: 40px 60px;
            border-radius: 80px;
            font-size: 2.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
            line-height: 1.2;
            width: 85%;
        }

        .status-badge span {
            display: block;
            font-size: 1.8rem;
            margin-top: 5px;
        }

        .usage-stats {
            text-align: center;
        }

        .time-display {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .cost-display {
            font-size: 1.6rem;
            font-weight: bold;
            color: #666;
        }

        .btn-stop {
            width: 100%;
            max-width: 260px;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #666;
            background: #fff;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <div class="header-logo">
            <i class="fas fa-home"></i>
            <span>いえ電シェア</span>
        </div>
    </header>

    <main>
        <h1>{{ user_name }}さんのマイページ</h1>

        <div class="action-grid">
            <div class="action-card">
                <i class="fas fa-plus action-card-icon"></i>
                <div>忘れた分<br>を追加</div>
            </div>
            <div class="action-card">
                <i class="fas fa-file-alt action-card-icon"></i>
                <div>記録を<br>みる</div>
            </div>
        </div>

        <div class="status-content">
            <div class="status-badge">
                運転中
                <span>運転中</span>
            </div>

            <div class="usage-stats">
                <div class="time-display">--時間--分</div>
                <div class="cost-display">--円（目安）</div>
            </div>

            <button class="btn-stop" type="button">運転を停止</button>
        </div>
    </main>
</div>

</body>
</html>
